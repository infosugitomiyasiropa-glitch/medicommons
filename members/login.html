<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会員ページ｜MediCommons</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Serif+Display:ital@0;1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #F4F7F2;
    --surface: #FFFFFF;
    --green:   #3A7D44;
    --green-dark: #2f6b3c;
    --teal:    #2A8F7F;
    --border:  #D8E2D5;
    --text:    #1C2A1E;
    --muted:   #7A8A82;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  body {
    min-height: 100vh;
    background: var(--bg);
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    background: var(--surface);
    border-radius: 20px;
    border: 1px solid var(--border);
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    text-align: center;
    animation: fadeUp 0.6s both;
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 24px; font-weight: 400;
    margin-bottom: 4px;
  }
  .logo span { color: var(--green); }

  .label {
    font-family: 'Space Mono', monospace;
    font-size: 10px; letter-spacing: 2px;
    color: var(--muted); margin-bottom: 32px;
  }

  .icon {
    width: 56px; height: 56px;
    background: rgba(58,125,68,0.08);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    margin: 0 auto 24px;
  }

  h1 {
    font-size: 18px; font-weight: 700;
    margin-bottom: 8px;
  }

  .desc {
    font-size: 13px; color: var(--muted);
    line-height: 1.8; margin-bottom: 28px;
  }

  .input-wrap {
    position: relative; margin-bottom: 16px;
  }

  input[type="password"] {
    width: 100%;
    padding: 14px 48px 14px 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 20px; letter-spacing: 6px;
    font-family: 'Space Mono', monospace;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    text-align: center;
  }
  input[type="password"]:focus {
    border-color: var(--green);
  }

  .toggle-pw {
    position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    cursor: pointer; color: var(--muted);
    font-size: 16px; padding: 4px;
  }

  .btn {
    width: 100%;
    padding: 14px;
    background: var(--green);
    color: #fff;
    border: none; border-radius: 10px;
    font-size: 15px; font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .btn:hover { background: var(--green-dark); }
  .btn:active { transform: scale(0.98); }

  .error {
    margin-top: 14px;
    font-size: 13px; color: #B94040;
    display: none;
  }
  .error.show { display: block; }

  .back {
    margin-top: 24px;
    font-size: 12px; color: var(--muted);
  }
  .back a {
    color: var(--green); text-decoration: none;
  }
  .back a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="card">
  <div class="logo">Medi<span>Commons</span></div>
  <div class="label">MEMBERS ONLY</div>

  <img src="../IMG_4080.png" alt="メディコ" style="width:64px;height:64px;object-fit:contain;margin:0 auto 24px;display:block;">
  <h1>会員ページ</h1>
  <p class="desc">参加薬局向けのページです。<br>暗証番号を入力してください。</p>

  <div class="input-wrap">
    <input type="password" id="pw" maxlength="10" placeholder="·····" autofocus>
    <button class="toggle-pw" onclick="togglePw()" title="表示切替">👁</button>
  </div>

  <button class="btn" onclick="checkPw()">入室する</button>
  <div class="error" id="err">暗証番号が違います。</div>

  <div class="back"><a href="../index.html">← トップページへ戻る</a></div>
</div>

<script>
  function checkPw() {
    const val = document.getElementById('pw').value;
    if (val === '00000') {
      sessionStorage.setItem('mc_auth', '1');
      window.location.href = 'index.html';
    } else {
      document.getElementById('err').classList.add('show');
      document.getElementById('pw').value = '';
      document.getElementById('pw').focus();
    }
  }

  function togglePw() {
    const input = document.getElementById('pw');
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  document.getElementById('pw').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkPw();
  });
</script>
</body>
</html>
